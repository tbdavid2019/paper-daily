name: Daily Paper Crawl

on:
  schedule:
    # UTC 02:00 Monday-Friday = UTC+8 10:00 Monday-Friday (Taiwan time).
    # This is after arXiv's Sunday-Thursday 20:00 US-Eastern announcements.
    - cron: '0 2 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Discovery report date (YYYY-MM-DD). Empty uses current UTC day.'
        required: false
        type: string
      topic:
        description: 'Topic profile from config/topics.json'
        required: false
        default: 'embodied_ai'
        type: string

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run crawler
        run: python scripts/crawl.py
        env:
          SCOUT_DATE: ${{ inputs.date || '' }}
          PAPER_TOPIC: ${{ inputs.topic || 'embodied_ai' }}

      - name: Commit and push data
        run: |
          git config user.name "paper-bot"
          git config user.email "paper-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || (git commit -m "📥 papers $(date +%Y-%m-%d)" && git push)
